server:
  port: 8080

spring:
  application:
    name: smartsales
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/smartsales}
    username: ${DB_USER:smartsales}
    password: ${DB_PASSWORD:smartsales}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Configuration applicative (JWT + service IA)
app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-prod-this-must-be-at-least-256-bits-long-secret-key}
    expiration-ms: 86400000   # 24h
  ai-service:
    url: ${AI_SERVICE_URL:http://localhost:8000}
