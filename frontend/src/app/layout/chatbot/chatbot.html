<div class="chatbot-wrapper">

  <!-- Panneau de conversation -->
  @if (isOpen()) {
    <div class="chatbot-panel" role="dialog" aria-label="Assistant SmartSales">

      <div class="chatbot-header">
        <div class="chatbot-title">
          <span class="chatbot-icon">💬</span>
          <span>Assistant SmartSales</span>
        </div>
        <button class="chatbot-close" type="button" (click)="toggle()" aria-label="Fermer">✕</button>
      </div>

      <div class="chatbot-messages" #messagesContainer>
        @for (msg of messages(); track $index) {
          <div class="message" [class.message-user]="msg.role === 'user'" [class.message-assistant]="msg.role === 'assistant'">
            <div class="message-bubble">
              <span class="message-text">{{ msg.text }}</span>
            </div>
            @if (msg.role === 'assistant' && msg.suggestions && msg.suggestions.length) {
              <div class="suggestions">
                @for (s of msg.suggestions; track s) {
                  <button class="suggestion-chip" type="button" (click)="send(s)">{{ s }}</button>
                }
              </div>
            }
          </div>
        }
        @if (loading()) {
          <div class="message message-assistant">
            <div class="message-bubble typing">
              <span class="dot"></span>
              <span class="dot"></span>
              <span class="dot"></span>
            </div>
          </div>
        }
        @if (error()) {
          <div class="chatbot-error">{{ error() }}</div>
        }
      </div>

      <div class="chatbot-input-area">
        <input
          class="chatbot-input"
          type="text"
          placeholder="Posez votre question…"
          [(ngModel)]="inputText"
          (keydown)="onKeydown($event)"
          [disabled]="loading()"
          aria-label="Message"
        />
        <button
          class="chatbot-send btn btn-primary btn-sm"
          type="button"
          (click)="send()"
          [disabled]="loading() || !inputText.trim()">
          Envoyer
        </button>
      </div>

    </div>
  }

  <!-- Bouton flottant -->
  <button class="chatbot-fab" type="button" (click)="toggle()" [class.open]="isOpen()" aria-label="Assistant">
    @if (isOpen()) {
      <span>✕</span>
    } @else {
      <span>💬</span>
    }
  </button>

</div>
