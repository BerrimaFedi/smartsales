# =============================================================================
# SmartSales — Orchestration Docker Compose
# Usage : docker compose up -d
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       smartsales
      POSTGRES_USER:     smartsales
      POSTGRES_PASSWORD: smartsales
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartsales -d smartsales"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Service IA Python (FastAPI)
  # ---------------------------------------------------------------------------
  ai-service:
    build:
      context: ./ai-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Backend Spring Boot
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    environment:
      # Connexion PostgreSQL — surcharge les defaults localhost de application.yml
      DB_URL:          jdbc:postgresql://postgres:5432/smartsales
      DB_USER:         smartsales
      DB_PASSWORD:     smartsales
      # Service IA — résolution par nom de service Docker
      AI_SERVICE_URL:  http://ai-service:8000
      # JWT (surcharger en production via un secret manager)
      JWT_SECRET:      change-me-in-prod-this-must-be-at-least-256-bits-long-secret-key
    ports:
      - "8080:8080"
    healthcheck:
      # bash /dev/tcp : ouvre une connexion TCP sur 8080 — réussit dès que Spring Boot accepte les connexions.
      # Disponible sans curl/wget sur eclipse-temurin (base Ubuntu).
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/8080'"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 90s

  # ---------------------------------------------------------------------------
  # Frontend Angular servi par nginx (+ reverse proxy /api/ → backend)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "4200:80"

  # ---------------------------------------------------------------------------
  # Seeder : charge smartsales-seed.sql une seule fois, après que Hibernate
  # ait créé les tables (la table 'users' apparaît = backend prêt).
  # restart: no => le conteneur s'arrête proprement après succès.
  # ---------------------------------------------------------------------------
  seeder:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      PGPASSWORD: smartsales
    volumes:
      - ./docker/seed/init.sh:/init.sh:ro
      - ./smartsales-seed.sql:/seed.sql:ro
    entrypoint: ["sh", "/init.sh"]
    restart: "no"

# =============================================================================
volumes:
  postgres_data:

networks:
  default:
    name: smartsales-net
