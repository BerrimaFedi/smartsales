server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy : les appels /api/ sont transmis au backend Docker
    # nginx résout "backend" via le réseau interne Docker, le navigateur ne
    # voit que des chemins relatifs — aucun CORS ni problème de résolution.
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Routing Angular (HTML5 History API)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
